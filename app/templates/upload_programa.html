{% extends "base.html" %}

{% block title %}Gymsight — Nueva clase{% endblock %}

{% block content %}
<section class="page-header">
  <h1>Nueva clase</h1>
  <p>Define la clase recurrente (p. ej. Pilates martes 10:00). Después podrás subir sesiones semanales.</p>
</section>

<form class="upload-form upload-form-wide" method="post" action="{{ url_for('uploads.upload_programa') }}">
  <div class="form-group">
    <label for="gimnasio_id">Gimnasio</label>
    <select id="gimnasio_id" name="gimnasio_id" required>
      {% for gimnasio in gimnasios %}
        <option value="{{ gimnasio.id }}" {% if gimnasio_id == gimnasio.id|string %}selected{% endif %}>
          {{ gimnasio.nombre }}
        </option>
      {% endfor %}
    </select>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="profesor_id">Profesor</label>
      <select id="profesor_id" name="profesor_id" required>
        <option value="">Seleccionar...</option>
        {% for profesor in profesores %}
          <option value="{{ profesor.id }}" {% if profesor_id == profesor.id|string %}selected{% endif %}>
            {{ profesor.nombre_completo }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label for="tipo_clase_id">Tipo de clase</label>
      <select id="tipo_clase_id" name="tipo_clase_id" required>
        <option value="">Seleccionar...</option>
        {% for tipo in tipos_clase %}
          <option value="{{ tipo.id }}" {% if tipo_clase_id == tipo.id|string %}selected{% endif %}>
            {{ tipo.nombre }}
          </option>
        {% endfor %}
      </select>
    </div>
  </div>

  <div class="form-group">
    <label for="nombre">Nombre de la clase</label>
    <input type="text" id="nombre" name="nombre" required
           placeholder="Ej. Pilates martes mañana"
           value="{{ nombre or '' }}">
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="sala">Sala (opcional)</label>
      <input type="text" id="sala" name="sala" placeholder="Ej. Sala 2"
             value="{{ sala or '' }}">
    </div>

    <div class="form-group">
      <label for="nivel">Nivel (opcional)</label>
      <input type="text" id="nivel" name="nivel" placeholder="Ej. Principiante"
             value="{{ nivel or '' }}">
    </div>
  </div>

  <button type="submit" class="btn btn-primary">Crear clase</button>
</form>
{% endblock %}
